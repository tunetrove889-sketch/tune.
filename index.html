<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Kumar | Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
}

header h1{
font-size:60px;
}

header p{
font-size:22px;
margin-top:10px;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:18px;
background:#fff;
border:none;
cursor:pointer;
border-radius:40px;
}

section{
padding:80px 10%;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:40px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:15px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
padding:40px;
text-align:center;
background:#000;
}

</style>

</head>

<body>

<header>

<h1>Dinesh Kumar</h1>

<p>Capturing Moments. Creating Stories.</p>

<button onclick="document.getElementById('portfolio').scrollIntoView({behavior:'smooth'})">
Explore
</button>

</header>

<section id="portfolio">

<h2>My Portfolio</h2>

<div class="gallery">

<img src="https://picsum.photos/500/600?1">

<img src="https://picsum.photos/500/600?2">

<img src="https://picsum.photos/500/600?3">

<img src="https://picsum.photos/500/600?4">

<img src="https://picsum.photos/500/600?5">

<img src="https://picsum.photos/500/600?6">

</div>

</section>

<footer>

<h2>Contact</h2>

<p>Email : yourmail@gmail.com</p>

<p>Instagram : @yourinstagram</p>

</footer>

</body>
</html>
